services:
  organoid-dashboard:
    image: samply/organoid-dashboard:main
    ports:
      - 5173:80
    environment:
      SPOT_PUBLIC_URL: http://localhost:8055
      SPOT_INTERNAL_URL: http://localhost:8056

  spot-public:
    image: samply/rustyspot:latest
    depends_on:
      - proxy1
    ports:
      - 8055:8055
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      BEAM_PROXY_URL: http://host.docker.internal:4001
      BEAM_APP_ID: spot.proxy1.broker
      BEAM_SECRET: pass123
      CORS_ORIGIN: http://localhost:5173
      PROJECT: organoid
      QUERY_FILTER: eyJwYXlsb2FkIjoiT1JHQU5PSURfREFTSEJPQVJEX1BVQkxJQyJ9 # ORGANOID_DASHBOARD_PUBLIC
      SITES: &sites proxy2

  spot-internal:
    image: samply/rustyspot:latest
    depends_on:
      - proxy1
    ports:
      - 8056:8055
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      BEAM_PROXY_URL: http://host.docker.internal:4001
      BEAM_APP_ID: prism.proxy1.broker
      BEAM_SECRET: pass123
      CORS_ORIGIN: http://localhost:5173
      PROJECT: organoid
      QUERY_FILTER: eyJwYXlsb2FkIjoiT1JHQU5PSURfREFTSEJPQVJEX0lOVEVSTkFMIn0= # ORGANOID_DASHBOARD_INTERNAL
      SITES: *sites

  focus:
    image: samply/focus:main
    depends_on:
      - proxy2
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      BEAM_PROXY_URL: http://host.docker.internal:4002
      BEAM_APP_ID_LONG: focus.proxy2.broker
      API_KEY: pass123
      ENDPOINT_TYPE: blaze-and-sql
      BLAZE_URL: http://host.docker.internal:8080/fhir/
      POSTGRES_CONNECTION_STRING: postgresql://postgres:mypassword@host.docker.internal/postgres

  blaze:
    image: samply/blaze:latest
    ports:
      - 8080:8080
    environment:
      ENFORCE_REFERENTIAL_INTEGRITY: false
    healthcheck:
      test: curl -f http://localhost:8080/fhir/metadata
      start_period: 1m
  
  blaze-loader:
    image: alpine:latest
    depends_on:
      blaze:
        condition: service_healthy
    volumes:
      - ./blaze-loader.sh:/blaze-loader.sh:ro
      - ./fhir-bundles/generated:/fhir-bundles:ro
    command: sh /blaze-loader.sh

  postgres:
    image: postgres:latest
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: mypassword

  fhir2sql:
    image: samply/fhir2sql:main
    depends_on:
      blaze-loader:
        condition: service_completed_successfully
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      BLAZE_BASE_URL: http://host.docker.internal:8080
      PG_HOST: host.docker.internal
      PG_USERNAME: postgres
      PG_PASSWORD: mypassword
      PG_DBNAME: postgres

  playwright:
    image: mcr.microsoft.com/playwright:v1.57.0-noble
    network_mode: host
    depends_on:
      blaze-loader:
        condition: service_completed_successfully
    environment:
      - CI=${CI}
    volumes:
      - ../playwright.config.ts:/test/playwright.config.ts:ro
      - ./playwright.spec.ts:/test/playwright.spec.ts:ro
    working_dir: /test
    command: bash -c 'npm i @playwright/test@1.57.0 && npx playwright test'

include:
  - ../compose.localbeam.yaml
